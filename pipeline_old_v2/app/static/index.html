<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CLAUSE AI &mdash; Requirement Ledger</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><b>CLAUSE</b><span>requirement ledger &middot; data centre EPC</span></div>
    <div class="top-spacer"></div>
    <div class="top-stat"><span class="dot" id="net-dot"></span><span id="net-lat">&mdash;</span></div>
    <div class="top-stat" id="top-spend"></div>
    <div id="clock"></div>
    <button class="btn" id="btn-recompute" title="Re-runs M5-M11 on the server and times each module">Recompute ledger</button>
  </header>

  <nav id="nav"></nav>

  <main id="main"></main>

  <footer><span style="flex-shrink:0">LIVE&nbsp;API</span><div id="ticker"></div></footer>
</div>

<div id="toast"></div>
<div id="doc-modal"><div class="doc-box" id="doc-box"></div></div>

<script src="app.js"></script>
</body>
</html>
