<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CLAUSE — requirement ledger</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <span class="seal" aria-hidden="true">C</span>
      <span class="brand-name">CLAUSE</span>
      <span class="brand-sub">requirement ledger</span>
    </div>
    <div class="top-right">
      <span class="net" title="last API round-trip"><span class="net-dot" id="net-dot"></span><span id="net-ms" class="mono">—</span></span>
      <span id="spend" class="mono" title="cumulative LLM spend for everything on screen">$—</span>
      <span id="clock" class="mono"></span>
      <button id="btn-recompute" class="btn btn-primary" title="re-run the deterministic layer live">Recompute</button>
      <button id="btn-settings" class="iconbtn" title="Settings · bring your own model"></button>
    </div>
  </header>
  <main id="view" tabindex="-1"></main>
  <nav id="tabs" aria-label="sections"></nav>
  <footer id="ticker" title="live server activity — every request, timed"><span id="ticker-inner" class="mono"></span></footer>
</div>
<div id="toast" class="hidden"></div>
<div id="modal" class="hidden" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-head"><span id="modal-title" class="mono"></span><button id="modal-close" class="iconbtn"></button></div>
    <div id="modal-body"></div>
  </div>
</div>
<div id="err-overlay" class="hidden"></div>
<script src="icons.js"></script>
<script src="app.js"></script>
</body>
</html>
