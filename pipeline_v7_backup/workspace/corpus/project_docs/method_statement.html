<!DOCTYPE html>
<html>
<head>
    <style>
        @page { size: A4; margin: 0; }
        * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fff;
            font-size: 10pt;
            line-height: 1.4;
            color: #1d2b38;
        }
        .page {
            width: 210mm;
            height: 297mm;
            box-sizing: border-box;
            padding: 20mm;
            position: relative;
            page-break-after: always;
            overflow: hidden;
            background: white;
        }
        .header {
            position: absolute;
            top: 15mm;
            left: 20mm;
            right: 20mm;
            border-bottom: 2.5px solid #16324f;
            padding-bottom: 3mm;
            font-size: 9pt;
            color: #16324f;
            font-weight: 600;
            letter-spacing: 0.4px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .footer {
            position: absolute;
            bottom: 15mm;
            left: 20mm;
            right: 20mm;
            border-top: 1px solid #b9c6d2;
            font-size: 9pt;
            color: #5c6b7a;
            text-align: right;
            padding-top: 3mm;
            letter-spacing: 0.3px;
        }
        .footnotes {
            position: absolute;
            bottom: 25mm;
            left: 20mm;
            right: 20mm;
            border-top: 1px solid #b9c6d2;
            padding-top: 2mm;
            font-size: 8pt;
            color: #44525f;
        }
        h1, h2, h3, h4 { color: #16324f; margin-top: 0; }
        h2 {
            border-bottom: 1px solid #d6dee6;
            padding-bottom: 1.5mm;
            letter-spacing: 0.5px;
        }
        h3 { letter-spacing: 0.3px; }
        table { width: 100%; border-collapse: collapse; margin-top: 5mm; font-size: 9pt; }
        th, td { border: 1px solid #c9d4de; padding: 6px; text-align: left; vertical-align: top; }
        th {
            background-color: #16324f;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.3px;
            border: 1px solid #16324f;
        }
        tr:nth-child(even) td { background-color: #f3f6f9; }
        .clause { margin-bottom: 4mm; text-align: justify; }
        .clause-id { font-weight: bold; color: #16324f; }

        /* Vendor styles */
        .vendor-VoltEdge { border-top: 4mm solid #0056b3; }
        .vendor-Deccan { border-top: 4mm solid #b8860b; }
        .vendor-CryoCore { border-top: 4mm solid #008080; }
        .vendor-Trident { border-top: 4mm solid #708090; }
        .vendor-AegisFire { border-top: 4mm solid #cc0000; }

        .logo-text { font-size: 18pt; font-weight: bold; letter-spacing: 1px; }
        .VoltEdge .logo-text { color: #0056b3; }
        .Deccan .logo-text { color: #b8860b; }
        .CryoCore .logo-text { color: #008080; }
        .Trident .logo-text { color: #708090; }
        .AegisFire .logo-text { color: #cc0000; }

        .cover-title {
            font-size: 24pt;
            margin-top: 40mm;
            text-align: center;
            letter-spacing: 2px;
            border-top: 1px solid #16324f;
            border-bottom: 1px solid #16324f;
            padding: 6mm 0;
        }
        .cover-meta { margin-top: 20mm; font-size: 12pt; }
        .cover-meta p { margin: 2.5mm 0; }
        .status-badge {
            display: inline-block;
            padding: 2mm 5mm;
            border-radius: 2mm;
            font-weight: bold;
            font-size: 14pt;
        }
        .status-ACTIVE { background: #d4edda; color: #155724; border: 1px solid #9fd3ab; }
        .status-SUPERSEDED { background: #f8d7da; color: #721c24; border: 1px solid #e3a5ac; }
    </style>
</head>
<body>
    

<div class="page">
    <div class="header">
        <span>Meridian Data Centre Campus - Phase 1</span>
        <span>Project Document</span>
    </div>
    
    <div class="content" style="margin-top: 10mm;">
        
        <h1 style="text-align: center; margin-bottom: 20mm;">Method Statement</h1>
        
        
        
        
            
                <p>Installation methodology for electrical works.</p>
            
        
    </div>
    
    <div class="footer">
        Page 1 of 1
    </div>
</div>


</body>
</html>
