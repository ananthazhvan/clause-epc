project:
  name: Meridian Data Centre Campus, Phase 1
  location: Navi Mumbai, India
  capacity: 20MW IT load
  tier_target: Tier III (Concurrently Maintainable)
  client: Meridian Digital Infrastructure Pvt Ltd.
  epc: you
  consultant: Apex Engineering Consultants
  design_basis:
    total_it_load_kw: 20000
    ups_redundancy: N+1
    design_ambient_temp_c: 45
    pue_target: 1.45
    generator_autonomy_h: 48
    cooling_redundancy: N+1
    battery_runtime_min: 10
    nominal_voltage_mv: 11
    nominal_voltage_lv: 0.415
timeline:
- event: VoltEdge UPS R0 submitted
  date: '2026-02-15'
- event: VoltEdge UPS R0 reviewed & rejected
  date: '2026-03-01'
- event: VoltEdge UPS R1 submitted
  date: '2026-03-15'
- event: Addendum No. 3 issued
  date: '2026-06-15'
  description: Modifies UPS efficiency and CRAH design water temp
rules:
  superseded_packages_rule: Superseded submittal packages are frozen at their last
    review verdict. They are never re-evaluated against subsequent design addenda.
    For example, VoltEdge UPS R0 remains rejected due to R0-specific deviations and
    is not re-verdicted for Addendum 3; only the active VoltEdge UPS R1 package is
    re-evaluated and flipped.
submittal_packages:
  VoltEdge UPS, R0:
    status: SUPERSEDED
    superseded_by: VoltEdge UPS, R1
  Deccan generator:
    status: ACTIVE
  CryoCore CRAH:
    status: ACTIVE
  Trident switchgear:
    status: ACTIVE
  AegisFire suppression:
    status: ACTIVE
  VoltEdge UPS, R1:
    status: ACTIVE
  VoltEdge battery cabinet:
    status: ACTIVE
spec_defects:
- defect_id: DEF-001
  section: 26 33 53
  type: contradiction
  description: Design Basis says UPS N+1, but Section 26 33 53 Part 2.1.2.A states
    'UPS system modules shall be configured in a minimum N+2 parallel redundant configuration'.
  location: 26 33 53 Part 2.1.2.A vs DBR Section 3.1
- defect_id: DEF-002
  section: 26 33 53
  type: contradiction
  description: UPS spec Section 26 33 53 Part 2.3.1.E requires a 10-min battery runtime,
    but its own Part 3.4.2.C Field testing acceptance criterion says 'inverter shall
    maintain full 100% IT load for a minimum of 12 minutes on battery power'.
  location: 26 33 53 Part 2.3.1.E vs Part 3.4.2.C
- defect_id: DEF-003
  section: 26 13 26
  type: contradiction
  description: Common Electrical Section 26 05 00 Part 1.4.3.B mandates IEC test certificates
    for all medium voltage gear, but Section 26 13 26 Part 1.2.1 references UL standards
    only for certification, causing a conflict.
  location: 26 05 00 Part 1.4.3.B vs 26 13 26 Part 1.2.1
- defect_id: DEF-004
  section: 23 81 23
  type: ambiguity
  description: CRAH cooling unit COP/efficiency is specified as 'minimum COP of 5.2'
    in Part 2.2.4.C with no operating conditions (no entering/leaving water temperatures
    or airflow speed specified), making the performance claim unverifiable.
  location: 23 81 23 Part 2.2.4.C
- defect_id: DEF-005
  section: 26 32 13
  type: ambiguity
  description: Generator room clause Part 3.2.1.F mandates 'adequate ventilation shall
    be provided in the generator room to prevent heat buildup,' which is an unverifiable
    qualitative requirement.
  location: 26 32 13 Part 3.2.1.F
- defect_id: DEF-006
  section: 21 22 00
  type: obsolete_reference
  description: Clean Agent Fire Suppression spec Section 21 22 00 Part 1.2.1 references
    'NFPA 2001 (2008 Edition)', which is a withdrawn standard revision.
  location: 21 22 00 Part 1.2.1
- defect_id: DEF-007
  section: 26 32 13
  type: code_conflict
  description: Section 26 32 13 Part 2.3.8.C demands generator day tanks support >=
    2.0 hours of runtime at full load (1040 L), which directly conflicts with local
    NBC fire safety codes capping indoor fuel day tanks at 1000 L.
  location: 26 32 13 Part 2.3.8.C vs NBC Part 4
addendum_3:
  doc_id: ADD-003
  date: '2026-06-15'
  changes:
  - reference: Section 26 33 53, Part 2.3.4
    action: DELETE '96%' and INSERT '96.5%'
    description: UPS double-conversion efficiency requirement increased from 96.0%
      to 96.5% at 50%, 75%, and 100% load points.
  - reference: Section 23 81 23, Part 2.2.1
    action: "DELETE '10\xB0C entering' and INSERT '11\xB0C entering'"
    description: "CRAH chilled water design entering temperature increased from 10\xB0\
      C to 11\xB0C, reducing cooling plant chiller energy."
  flips:
  - id: DEV-UPS-R1-ADD3-EFF100
    type: check
    before_verdict: COMPLIANT
    after_verdict: DEVIATION
    explanation: UPS R1 efficiency at 100% load is 96.2%. Spec is increased from 96.0%
      to 96.5% under Addendum 3, flipping this parameter non-compliant.
  - id: DEV-UPS-R1-ADD3-EFF75
    type: check
    before_verdict: COMPLIANT
    after_verdict: DEVIATION
    explanation: UPS R1 efficiency at 75% load is 96.0%. Spec is increased from 96.0%
      to 96.5% under Addendum 3, flipping this parameter non-compliant.
  - id: DEV-UPS-R1-ADD3-EFF50
    type: check
    before_verdict: COMPLIANT
    after_verdict: DEVIATION
    explanation: UPS R1 efficiency at 50% load is 96.2%. Spec is increased from 96.0%
      to 96.5% under Addendum 3, flipping this parameter non-compliant.
  - id: COMP-CRAH-CHW-IN
    type: check
    before_verdict: COMPLIANT
    after_verdict: DEVIATION
    explanation: "CRAH entering water temperature claimed is 10\xB0C. Addendum 3 shifts\
      \ spec to 11\xB0C entering, making the 10\xB0C unit a deviation."
  - id: PO-263353-H1
    type: po
    before_verdict: VALID
    after_verdict: INVALID
    explanation: UPS modules procured under PO-263353-H1 no longer meet the updated
      efficiency specification of 96.5%.
  - id: PO-263353-H2
    type: po
    before_verdict: VALID
    after_verdict: INVALID
    explanation: UPS modules procured under PO-263353-H2 no longer meet the updated
      efficiency specification of 96.5%.
  - id: PO-263353-H3
    type: po
    before_verdict: VALID
    after_verdict: INVALID
    explanation: UPS modules procured under PO-263353-H3 no longer meet the updated
      efficiency specification of 96.5%.
  - id: PO-263353-H4
    type: po
    before_verdict: VALID
    after_verdict: INVALID
    explanation: UPS modules procured under PO-263353-H4 no longer meet the updated
      efficiency specification of 96.5%.
  - id: PO-238123-H1
    type: po
    before_verdict: VALID
    after_verdict: INVALID
    explanation: "CRAH units procured under PO-238123-H1 are designed for 10\xB0C\
      \ entering chilled water, but the chilled water loop design has changed to 11\xB0\
      C."
  - id: PO-238123-H2
    type: po
    before_verdict: VALID
    after_verdict: INVALID
    explanation: "CRAH units procured under PO-238123-H2 are designed for 10\xB0C\
      \ entering chilled water, but the chilled water loop design has changed to 11\xB0\
      C."
  - id: PO-238123-H3
    type: po
    before_verdict: VALID
    after_verdict: INVALID
    explanation: "CRAH units procured under PO-238123-H3 are designed for 10\xB0C\
      \ entering chilled water, but the chilled water loop design has changed to 11\xB0\
      C."
  - id: PO-238123-H4
    type: po
    before_verdict: VALID
    after_verdict: INVALID
    explanation: "CRAH units procured under PO-238123-H4 are designed for 10\xB0C\
      \ entering chilled water, but the chilled water loop design has changed to 11\xB0\
      C."
  - id: CX-UPS-L5-01
    type: cx_test
    before_verdict: VALID
    after_verdict: STALE
    explanation: Acceptance criteria of 96.0% efficiency in the UPS L5 test plan is
      now stale and must be updated to 96.5%.
  - id: CX-CRAH-L4-01
    type: cx_test
    before_verdict: VALID
    after_verdict: STALE
    explanation: "Acceptance criteria of 250 kW capacity at 10\xB0C entering water\
      \ temp in the CRAH test plan is now stale and must be updated to 11\xB0C entering\
      \ water temp."
deviations:
- check_id: DEV-UPS-R0-EFF50
  package: VoltEdge UPS, R0
  spec_clause: 26 33 53 Part 2.2.2.B
  rule_id: UPS-EFF-50
  deviation_type: value_out_of_spec
  tier: T3
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: Datasheet table claims 96.1% efficiency at 50% load, but footnote 3
    on page 8 states 'Efficiency reduces to 95.1% under VFI mode when harmonic filters
    are active at 50% load', which is below the 96% spec requirement.
  where_expressed: footnote
- check_id: DEV-UPS-R0-RED
  package: VoltEdge UPS, R0
  spec_clause: 26 33 53 Part 2.1.2.A
  rule_id: UPS-REDUNDANCY
  deviation_type: configuration_deviation
  tier: T2
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: Vendor submittal proposes N+1 module configuration (5 active, 1 standby)
    which complies with the Design Basis Report but violates Section 26 33 53 Part
    2.1.2.A which mistakenly demands a minimum of N+2 redundancy.
  where_expressed: main table
- check_id: DEV-UPS-R0-CERT
  package: VoltEdge UPS, R0
  spec_clause: 26 33 53 Part 1.4.1.C
  rule_id: UPS-CERTIFICATION
  deviation_type: certification_mismatch
  tier: T2
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: Vendor submittal states compliance with IEC 62040-2 (EMC requirements)
    but does not provide certification under IEC 62040-3 (performance and test requirements)
    as explicitly mandated.
  where_expressed: compliance matrix
- check_id: DEV-UPS-R0-REV
  package: VoltEdge UPS, R0
  spec_clause: 26 33 53 Part 1.3.1
  rule_id: UPS-SPEC-REVISION
  deviation_type: revision_mismatch
  tier: T1
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: Submittal transmittal cover sheet states the submittal is reviewed
    against spec revision 'Rev 2020', but the active project specification is 'Rev
    2024'.
  where_expressed: transmittal
- check_id: DEV-UPS-R0-MISS-PARAM
  package: VoltEdge UPS, R0
  spec_clause: 26 33 53 Part 2.2.8
  rule_id: UPS-BYPASS-TRANSFER-TIME
  deviation_type: missing_parameter
  tier: T1
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: Bypass static switch transfer time (spec required <= 4ms) is completely
    missing from the vendor datasheet parameter table.
  where_expressed: missing
- check_id: DEV-UPS-R0-OVERLOAD
  package: VoltEdge UPS, R0
  spec_clause: 26 33 53 Part 2.2.5.A
  rule_id: UPS-OVERLOAD-CAPACITY
  deviation_type: value_out_of_spec
  tier: T2
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
