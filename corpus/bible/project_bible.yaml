  where_expressed: compliance matrix
- check_id: DEV-FIRE-MISS-PARAM
  package: AegisFire suppression
  spec_clause: 21 22 00 Part 2.3.4.F
  rule_id: FIRE-NOAEL-MARGIN
  deviation_type: missing_parameter
  tier: T1
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: The NOAEL safety margin calculation is missing from the vendor submittal
    package.
  where_expressed: missing
- check_id: DEV-FIRE-PRESSURE
  package: AegisFire suppression
  spec_clause: 21 22 00 Part 2.3.1.A
  rule_id: FIRE-CYLINDER-PRESSURE
  deviation_type: configuration_deviation
  tier: T2
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: Submittal provides a 360 psi ECS system. Spec requires 500 psi ECS-500
