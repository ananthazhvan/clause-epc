  where_expressed: missing
- check_id: DEV-FIRE-STD-OBS
  package: AegisFire suppression
  spec_clause: 21 22 00 Part 1.2.1
  rule_id: FIRE-STD-EDITION
  deviation_type: certification_mismatch
  tier: T2
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: Submittal states compliance with NFPA 2001 (2008 Edition). The project
