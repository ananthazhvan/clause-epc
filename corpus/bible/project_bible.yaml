- chiller COP dispute across RFI, ADD-001 and R1
- UPS efficiency condition at unity pf versus 0.9 lagging
- switchboard short-circuit certificate rating
- CryoCore transshipment dwell and programme slip
- clean-agent cylinder pressure source conflict
- mill certificate heat trace absent from materials master
addenda:
- id: ADD-001
  date: '2026-03-02'
  changes:
  - section: 23 64 26
    part: '2.1'
    old: Minimum full-load COP shall be 6.0.
    new: Minimum full-load COP shall be 6.3.
    description: Revised chiller efficiency requirement.
  - section: 26 33 53
    part: '2.7'
    old: Test efficiency in accordance with IEC 62040-3.
    new: Test efficiency in accordance with IEC 62040-3:2021 at 0.9 lagging power
      factor; unity-power-factor data may be supplementary only.
    description: Clarified UPS test condition.
- id: ADD-002
  date: '2026-05-11'
  changes:
  - section: 23 65 00
    part: '2.4'
    old: Sound pressure shall not exceed 84 dBA at 1 m.
    new: Sound pressure shall not exceed 82 dBA at 1 m.
    description: Revised cooling-tower acoustics.
  - section: 27 15 00
    part: '2.4'
    old: Cable fire performance shall be Cca-s1,d1,a1.
    new: Cable fire performance shall be B2ca-s1a,d1,a1.
    description: Enhanced cable fire class.
