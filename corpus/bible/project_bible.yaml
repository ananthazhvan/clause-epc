  where_expressed: main table
- check_id: DEV-CRAH-AMB-CHW
  package: CryoCore CRAH
  spec_clause: 23 81 23 Part 2.2.4.C
  rule_id: CRAH-COP-AMBIGUITY
  deviation_type: condition_mismatch
  tier: T3
  verdict_pre_addendum: NEEDS_REVIEW
  verdict_post_addendum: NEEDS_REVIEW
  explanation: Vendor submittal claims a COP of 5.3, matching the required COP of
    5.2, but fails to state the chilled water entering/leaving temperatures or the
    air wet/dry bulb temperatures at which this COP is achieved, leaving the claim
    unverifiable. A deterministic verifier cannot rule on this.
  where_expressed: main table
- check_id: DEV-CRAH-UNIT-HP
  package: CryoCore CRAH
  spec_clause: 23 81 23 Part 2.3.2.B
  rule_id: CRAH-MOTOR-UNIT
  deviation_type: unit_mismatch
  tier: T2
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: 'CRAH fan motor power is listed as ''7.5 HP'' in the datasheet. The
    spec requires motor power to be defined in electrical kilowatts (kW) (conversion:
    7.5 HP * 0.746 = 5.6 kW).'
  where_expressed: main table
- check_id: DEV-CRAH-REFRIGERANT
  package: CryoCore CRAH
  spec_clause: 23 81 23 Part 2.2.8
  rule_id: CRAH-REFRIGERANT-TYPE
  deviation_type: value_out_of_spec
  tier: T1
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: CRAH cooling coil utilizes R-407C refrigerant, but spec clause 2.2.8
    explicitly mandates R-410A refrigerant for compliance with environmental policies.
  where_expressed: main table
- check_id: DEV-CRAH-MISS-PARAM
  package: CryoCore CRAH
  spec_clause: 23 81 23 Part 2.3.5.A
  rule_id: CRAH-VALVE-CV
  deviation_type: missing_parameter
  tier: T1
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: The valve flow coefficient (Cv) of the 2-way modulating control valve
