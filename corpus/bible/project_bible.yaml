  where_expressed: missing
- check_id: DEV-CRAH-HUMIDIFIER
  package: CryoCore CRAH
  spec_clause: 23 81 23 Part 2.3.6.B
  rule_id: CRAH-HUMIDIFIER-TYPE
  deviation_type: configuration_deviation
  tier: T2
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: Vendor submittal specifies an infrared humidifier system. The specification
    explicitly mandates an electrode steam generating humidifier for humidity control.
  where_expressed: main table
- check_id: DEV-CRAH-VALVE-TYPE
  package: CryoCore CRAH
  spec_clause: 23 81 23 Part 2.3.5.C
  rule_id: CRAH-VALVE-TYPE
  deviation_type: configuration_deviation
  tier: T2
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: CRAH is provided with a standard 2-way modulating control valve. Spec
    requires a pressure independent control valve (PICV) for chilled water flow regulation.
  where_expressed: main table
- check_id: DEV-CRAH-WIDTH
  package: CryoCore CRAH
  spec_clause: 23 81 23 Part 2.4.1.A
  rule_id: CRAH-UNIT-WIDTH
  deviation_type: value_out_of_spec
  tier: T1
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: CRAH unit overall cabinet width is 2450 mm. The spec mandates a maximum
    cabinet width of 2400 mm to ensure transport clearance in corridors.
  where_expressed: main table
- check_id: DEV-FIRE-CERT-MISS
  package: AegisFire suppression
  spec_clause: 21 22 00 Part 1.3.3
  rule_id: FIRE-TEST-CERTIFICATE
  deviation_type: missing_document
  tier: T1
  verdict_pre_addendum: MISSING
  verdict_post_addendum: MISSING
  explanation: The vendor submittal package does not contain the required UL/FM factory
