- check_id: DEV-FIRE-HOLDTIME
  package: AegisFire suppression
  spec_clause: 21 22 00 Part 2.2.3.B
  rule_id: FIRE-HOLD-TIME
  deviation_type: value_out_of_spec
  tier: T1
  verdict_pre_addendum: DEVIATION
  verdict_post_addendum: DEVIATION
  explanation: Vendor compliance matrix states the agent hold time (retention) is
