<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #1a365d;
            --primary-light: #2b6cb0;
            --secondary: #4a5568;
            --success: #2f855a;
            --error: #9b2c2c;
            --warning: #c05621;
            --text-dark: #2d3748;
            --text-light: #718096;
            --border-color: #cbd5e0;
            --bg-light: #f7fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.5;
            background-color: #ffffff;
            font-size: 10.5pt;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 25mm 20mm 25mm 20mm;
            box-sizing: border-box;
            position: relative;
            page-break-after: always;
            background-color: white;
        }

        .header {
            position: absolute;
            top: 12mm;
            left: 20mm;
            right: 20mm;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 8.5pt;
            color: var(--text-light);
            border-bottom: 1.5px solid var(--border-color);
            padding-bottom: 2mm;
        }

        .header .logo {
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .footer {
            position: absolute;
            bottom: 12mm;
            left: 20mm;
            right: 20mm;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 8.5pt;
            color: var(--text-light);
            border-top: 1px solid var(--border-color);
            padding-top: 2mm;
        }

        h1, h2, h3, h4 {
            color: var(--primary);
            margin-top: 0;
            font-weight: 600;
        }

        h1 {
            font-size: 24pt;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 16pt;
            border-bottom: 1px solid var(--primary);
            padding-bottom: 3px;
            margin-bottom: 12px;
            margin-top: 20px;
        }

        h3 {
            font-size: 12.5pt;
            margin-bottom: 8px;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            font-size: 9.5pt;
        }

        th {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            text-align: left;
            padding: 6px 8px;
            border: 1px solid var(--primary);
        }

        td {
            padding: 6px 8px;
            border: 1px solid var(--border-color);
        }

        tr:nth-child(even) td {
            background-color: var(--bg-light);
        }

        .footnote {
            font-size: 8pt;
            color: var(--text-light);
            margin-top: 10px;
            line-height: 1.3;
        }

        .stamp {
            position: absolute;
            top: 30mm;
            right: 20mm;
            border: 4px double;
            padding: 8px 15px;
            font-size: 14pt;
            font-weight: 700;
            text-transform: uppercase;
            transform: rotate(-5deg);
            z-index: 100;
            background-color: white;
        }

        .stamp-approved {
            color: var(--success);
            border-color: var(--success);
        }

        .stamp-approved-noted {
            color: var(--warning);
            border-color: var(--warning);
        }

        .stamp-revise-resubmit {
            color: var(--error);
            border-color: var(--error);
        }

        .hidden-anchor {
            font-size: 1px;
            color: transparent;
            position: absolute;
            bottom: 0;
            right: 0;
        }
        
        .alert-box {
            border-left: 4px solid var(--primary-light);
            background-color: var(--bg-light);
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 0 4px 4px 0;
            font-size: 9.5pt;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
