<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CLAUSE AI — Project Meridian</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<aside id="sidebar">
  <div class="brand">CLAUSE <span>AI</span><div class="sub">Project Meridian · 20MW Tier III</div></div>
  <nav>
    <button class="nav-btn active" data-view="dashboard">Dashboard</button>
    <button class="nav-btn" data-view="queue">Submittal Queue</button>
    <button class="nav-btn" data-view="review">Review</button>
    <button class="nav-btn" data-view="graph">Ledger Graph</button>
    <button class="nav-btn" data-view="blast">Blast Wave</button>
    <button class="nav-btn" data-view="ncr">NCR Register</button>
  </nav>
  <div class="foot">deterministic verifier · every verdict cites both documents</div>
</aside>
<main id="main">
  <section id="view-dashboard" class="view active"></section>
  <section id="view-queue" class="view"></section>
  <section id="view-review" class="view"></section>
  <section id="view-graph" class="view">
    <div id="graph-wrap"><canvas id="graph-canvas"></canvas>
      <div id="graph-panel" class="hidden"></div>
      <div id="graph-legend"></div>
    </div>
  </section>
  <section id="view-blast" class="view"></section>
  <section id="view-ncr" class="view"></section>
</main>
<script src="app.js"></script>
</body>
</html>
